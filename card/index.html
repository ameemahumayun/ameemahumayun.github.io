<!-- HERO — the flip card replaces the entire about/intro block on this
     preview page. See index.html for the real, untouched homepage. -->
<header class="hero hero--card">
  <div class="hero__inner">

    <div class="biz-card-wrap">
      <div class="biz-card-float">
        <button type="button" class="biz-card" id="biz-card" aria-pressed="false" aria-label="Flip business card">
          <div class="biz-card__inner">

            <div class="biz-card__face biz-card__face--front">
              <!-- Drop your logo file at assets/images/logo.svg — sizing and
                   placement are handled by .biz-card__logo in components.css. -->

              <div class="biz-card__name-fancy">Ameemah Humayun</div>
              <div class="biz-card__keywords">
                <div class="biz-card__keywords-line">UX Researcher</div>
                <div class="biz-card__keywords-line">Human-Centered AI &middot; Culturally Situated Design</div>
              </div>
              <div class="biz-card__pubs">
                <span class="biz-card__pubs-label">Publications</span>
                <a href="https://doi.org/10.1145/3772318.3791315" target="_blank" rel="noopener">CHI 2026</a> &middot; SOUPS 2026 &middot; Nature Health
              </div>
            </div>

            <div class="biz-card__face biz-card__face--back">
              <img class="biz-card__photo2" src="{{ '/assets/images/me.jpg' | relative_url }}" alt="Portrait of Ameemah Humayun" width="600" height="802">
              <div class="biz-card__about">
                <p>hi! welcome to my space :) i'm a mixed-methods UX researcher working at the intersection of human-centered AI and healthcare, focused on culturally situated design in sensitive, high-stakes contexts. i graduated with a BSc in CS from LUMS in june 2026.</p>
                <div class="biz-card__current">
                  <span class="biz-card__current-label">Currently at</span>
                  Awaaz-e-Sehat &middot; The National AI Hub
                </div>
                <div class="biz-card__contact">
                  <a href="mailto:ameemah.humayun@gmail.com">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                      <rect x="3" y="5" width="18" height="14" rx="2" stroke-width="1.6"/>
                      <path d="M4 7l8 6 8-6" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    ameemah.humayun@gmail.com
                  </a>
                  <a href="{{ site.linkedin }}" target="_blank" rel="noopener">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                      <rect x="3" y="3" width="18" height="18" rx="4" stroke-width="1.6"/>
                      <circle cx="8" cy="8.5" r="1" fill="currentColor" stroke="none"/>
                      <path d="M8 11v6" stroke-width="1.6" stroke-linecap="round"/>
                      <path d="M12 17v-3.2c0-1.5 1-2.3 2.2-2.3S16 12.3 16 13.8V17" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>

                    LinkedIn

                </div>
              </div>
            </div>

          </div>
        </button>
      </div>
    </div>

  </div>
</header>

<!-- RECENT UPDATES -->
<section class="section" id="recent-updates" style="padding-top:var(--space-6);">
  <div class="container-wide">
    <h3>Recent Updates</h3>
    <div class="timeline">
      {%- for update in site.data.updates %}
      <div class="timeline__item">
        <div class="timeline__date">{{ update.date }}</div>
        <div class="timeline__text">{{ update.text }}</div>
      </div>
      {%- endfor %}
    </div>
  </div>
</section>

<script>
  (function () {
    var card = document.getElementById('biz-card');
    if (!card) return;
    card.addEventListener('click', function () {
      var flipped = card.classList.toggle('is-flipped');
      card.setAttribute('aria-pressed', flipped ? 'true' : 'false');
    });
  })();
</script>
