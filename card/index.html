<!-- HERO — the flip card replaces the entire about/intro block on this
     preview page. See index.html for the real, untouched homepage. -->
<header class="hero hero--card">
  <div class="hero__inner">

    <div class="biz-card-wrap">
      <div class="biz-card-float">
        <button type="button" class="biz-card" id="biz-card" aria-pressed="false" aria-label="Flip business card">
          <div class="biz-card__inner">

            <div class="biz-card__face biz-card__face--front">
              <svg class="biz-card__logo" viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path class="biz-card__logo-ribbon" d="M18 105 C 34 82, 46 60, 44 28" stroke-width="9" stroke-linecap="round"/>
                <path class="biz-card__logo-mark" d="M62 14 C 78 20, 80 42, 63 50 C 48 57, 38 49, 45 39 C 52 30, 66 33, 63 46 C 61 57, 45 66, 36 80 C 30 89, 32 99, 42 96" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <div class="biz-card__name-fancy">Ameemah Humayun</div>
              <div class="biz-card__keywords">
                <div class="biz-card__keywords-line">UX Researcher</div>
                <div class="biz-card__keywords-line">Human-Centered AI &middot; Culturally Situated Design</div>
              </div>
              <div class="biz-card__pubs">
                <span class="biz-card__pubs-label">Publications</span>
                CHI 2026 &middot; SOUPS 2026 &middot; Nature Health
              </div>
            </div>

            <div class="biz-card__face biz-card__face--back">
              <img class="biz-card__photo2" src="{{ '/assets/images/me.jpg' | relative_url }}" alt="Portrait of Ameemah Humayun" width="600" height="802">
              <div class="biz-card__about">
                <p>hi! welcome to my space :) i'm a mixed-methods UX researcher working at the intersection of human-centered AI and healthcare, focused on culturally situated design in sensitive, high-stakes contexts. i graduated with a BSc in CS from LUMS in june 2026 and am currently working at Awaaz-e-Sehat and The National AI Hub.</p>
                <div class="biz-card__contact">
                  ameemah.humayun@gmail.com &middot; <a href="{{ site.linkedin }}" target="_blank" rel="noopener">LinkedIn</a>
                </div>
              </div>
            </div>

          </div>
        </button>
      </div>
    </div>

  </div>
</header>

<!-- RECENT UPDATES -->
<section class="section" id="recent-updates" style="padding-top:var(--space-6);">
  <div class="container-wide">
    <h3>Recent Updates</h3>
    <div class="timeline">
      {%- for update in site.data.updates %}
      <div class="timeline__item">
        <div class="timeline__date">{{ update.date }}</div>
        <div class="timeline__text">{{ update.text }}</div>
      </div>
      {%- endfor %}
    </div>
  </div>
</section>

<script>
  (function () {
    var card = document.getElementById('biz-card');
    if (!card) return;
    card.addEventListener('click', function () {
      var flipped = card.classList.toggle('is-flipped');
      card.setAttribute('aria-pressed', flipped ? 'true' : 'false');
    });
  })();
</script>
