---
layout: default
title: Contact
description: Get in touch.
active: contact
---

<header class="page-head">
  <div class="page-head__inner">
    <div class="eyebrow eyebrow-rule">contact me</div>
    <h1 class="page-head__title"><span class="serif" style="color:var(--color-text-strong);">Say Hello :)</span></h1>
    <p class="page-head__intro">
      Email me directly at <a href="mailto:ameemah.humayun@gmail.com" style="color:var(--color-accent);">ameemah.humayun@gmail.com</a> or find me on <a href="{{ site.linkedin }}" target="_blank" rel="noopener" style="color:var(--color-accent);">LinkedIn</a> — or just drop me a message here!
    </p>
  </div>
</header>

<section class="section contact-form-section" style="padding-top:var(--space-6);">
  <div class="container-wide">
    <form class="contact-form" id="contact-form" action="https://formsubmit.co/ameemah.humayun@gmail.com" method="POST">
      <input type="hidden" name="_subject" value="New message from ameemahumayun.github.io">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" value="https://ameemahumayun.github.io/contact/?sent=true">
      <input type="text" name="_honey" style="display:none" tabindex="-1" autocomplete="off">

      <div class="contact-form__fields">
        <div class="contact-form__grid">
          <div class="contact-form__col">
            <div class="contact-form__field">
              <label for="cf-name">Name</label>
              <input type="text" id="cf-name" name="name" required>
            </div>
            <div class="contact-form__field">
              <label for="cf-email">Email</label>
              <input type="email" id="cf-email" name="email" required>
            </div>
          </div>
          <div class="contact-form__field contact-form__field--message">
            <label for="cf-message">Message</label>
            <textarea id="cf-message" name="message" required></textarea>
          </div>
        </div>
        <div class="contact-form__submit-row">
          <button type="submit" class="contact-form__submit">Send</button>
        </div>
      </div>
      <p class="contact-form__thanks">thanks — i&rsquo;ll get back to you as soon as i can.</p>
    </form>
  </div>
</section>

<script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    if (params.get('sent') === 'true') {
      var form = document.getElementById('contact-form');
      if (form) form.classList.add('contact-form--sent');
      if (window.history.replaceState) {
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    }
  })();
</script>
